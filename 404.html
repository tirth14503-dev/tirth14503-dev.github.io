<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>404 — Container Overboard · Tirthal Kothari</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f7;color:#1d1d1f;font-family:Georgia,'Times New Roman',serif;text-align:center;padding:2rem;}
  .wrap{max-width:560px;}
  .eyebrow{font-family:Consolas,monospace;font-size:.68rem;letter-spacing:.5em;color:#b8860b;text-transform:uppercase;margin-bottom:1.6rem;}
  h1{font-size:clamp(5rem,18vw,9rem);line-height:1;font-weight:400;margin-bottom:.4rem;}
  h1 em{font-style:italic;color:#b8860b;}
  .rule{width:44px;height:2px;background:linear-gradient(90deg,#b8860b,#d4a017);margin:1.6rem auto;border-radius:2px;}
  p{font-family:'Segoe UI',system-ui,sans-serif;color:#6e6e73;line-height:1.7;font-size:1rem;margin-bottom:2.2rem;}
  a.btn{display:inline-block;font-family:'Segoe UI',system-ui,sans-serif;font-weight:600;font-size:.92rem;color:#fff;background:#b8860b;padding:.85rem 2rem;border-radius:26px;text-decoration:none;transition:transform .2s,background .2s;}
  a.btn:hover{background:#d4a017;transform:translateY(-2px);}
  .box{display:inline-block;margin-bottom:1.8rem;animation:bob 3.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-12px) rotate(4deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Cargo Manifest · Exception</div>
  <div class="box">
    <svg width="88" height="60" viewBox="0 0 88 60" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="84" height="56" rx="6" fill="#b8860b"/>
      <g stroke="#f5f5f7" stroke-width="3">
        <line x1="16" y1="10" x2="16" y2="50"/><line x1="30" y1="10" x2="30" y2="50"/>
        <line x1="44" y1="10" x2="44" y2="50"/><line x1="58" y1="10" x2="58" y2="50"/>
        <line x1="72" y1="10" x2="72" y2="50"/>
      </g>
    </svg>
  </div>
  <h1>4<em>0</em>4</h1>
  <div class="rule"></div>
  <p>This container went overboard — the page you're looking for isn't on the manifest. Everything of value is still safely at the port.</p>
  <a class="btn" href="/">Back to the port →</a>
</div>
</body>
</html>
